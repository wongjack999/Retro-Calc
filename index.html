<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#e3e7ee">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    
    <title>CASIO STYLE TRADING CALCULATOR V3.8</title>
    <style>
        /* Safari 修正：禁止全頁彈跳與選取 */
        html, body {
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* LIGHT MODE */
        :root {
            --bg-color: #e3e7ee;
            --case-color: #e8ecf3;
            --primary-orange: #ff6f00; 
            --text-color: #2d3748;
            --text-muted: #5a6578;
            --shadow-dark: #b8c2d1;
            --shadow-light: #ffffff;
            --loss-red: #d32f2f;
            --lcd-bg: #a3b899; 
            --lcd-text: #1a2515;
        }

        /* DARK MODE */
        html.dark-mode, body.dark-mode {
            --bg-color: #1e2024;
            --case-color: #252830;
            --primary-orange: #ff761a;
            --text-color: #e2e8f0;
            --text-muted: #a0aec0;
            --shadow-dark: #131518;
            --shadow-light: #313642;
            --loss-red: #ff6b6b;
            --lcd-bg: #15171c;
            --lcd-text: #ff761a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Mono", "Segoe UI Mono", monospace;
            font-weight: 600; 
            text-transform: uppercase; 
            transition: all 0.3s ease;
        }

        html { background-color: var(--bg-color) !important; height: 100%; color-scheme: light; }
        html.dark-mode { color-scheme: dark; }

        body {
            background-color: var(--bg-color) !important;
            display: flex;
            justify-content: center;
            align-items: center; 
            /* 修正：使用 100dvh 取代 100vh，解決 Safari 底部遮擋 */
            height: 100dvh;
            padding: 20px;
        }

        .calculator-casio {
            background: var(--case-color);
            width: 100%;
            max-width: 440px;
            padding: 32px 26px; 
            border-radius: 26px;
            box-shadow: 15px 15px 30px var(--shadow-dark), -15px -15px 30px var(--shadow-light);
            border: 4px solid var(--case-color);
            transform: translateY(0);
        }

        body.keyboard-open .calculator-casio { transform: translateY(-40px); }

        .casio-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 2px; }
        .brand-logo { font-size: 1.25rem; letter-spacing: 1.5px; color: var(--text-color) !important; }
        .brand-logo span { font-size: 0.7rem; vertical-align: super; margin-left: 2px; }

        .solar-panel { background: #3b2314; width: 95px; height: 26px; border-radius: 4px; display: flex; gap: 3px; padding: 3px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4); }
        .solar-grid { flex: 1; background: #5c3a21; opacity: 0.8; border-right: 1px solid #22120a; }

        /* LCD SCREEN */
        .lcd-screen {
            background: var(--lcd-bg);
            padding: 20px 20px; 
            border-radius: 14px;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.25), inset -4px -4px 6px rgba(255,255,255,0.1);
            margin-bottom: 28px;
            text-align: right;
            border: 3px solid rgba(0, 0, 0, 0.05);
            overflow: hidden; 
        }

        .lcd-screen.is-loss .result-title,
        .lcd-screen.is-loss .profit-value { color: var(--loss-red) !important; }

        .result-title { font-size: 0.82rem; color: var(--lcd-text) !important; opacity: 0.85; letter-spacing: 1px; margin-bottom: 8px; white-space: nowrap; }
        .profit-display-container { display: flex; justify-content: flex-end; align-items: baseline; color: var(--lcd-text) !important; width: 100%; }
        .profit-value { font-size: 2.2rem; letter-spacing: -0.5px; white-space: nowrap; }

        /* INPUTS & CONTROLS */
        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
        .casio-field { display: flex; flex-direction: column; }
        .casio-field label { font-size: 0.75rem; color: var(--text-muted) !important; margin-bottom: 8px; text-align: center; letter-spacing: 0.5px; }
        .casio-field input { width: 100%; padding: 14px 5px; border: none; border-radius: 12px; background: var(--case-color); color: var(--text-color) !important; font-size: 1.15rem; text-align: center; outline: none; box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        .casio-field input.focused { color: var(--primary-orange) !important; box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light); }

        .control-row { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; margin-bottom: 24px; }
        .casio-btn-block { background: var(--case-color); padding: 18px 12px; border-radius: 16px; box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .block-title { font-size: 0.75rem; color: var(--text-muted) !important; margin-bottom: 6px; letter-spacing: 0.5px; }
        .block-value { font-size: 1.15rem; color: var(--text-color) !important; margin-bottom: 10px; }

        .sl-box { flex-direction: column; }
        .sl-ctrls { display: flex; align-items: center; gap: 14px; width: 100%; justify-content: center; }
        .btn-casio-key { border: none; background: var(--case-color); color: var(--text-color) !important; width: 38px; height: 32px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light); outline: none; user-select: none; }
        .btn-casio-key:active { box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light); }

        .dark-mode-box { flex-direction: column; }
        .ios-toggle-switch { position: relative; width: 54px; height: 30px; border-radius: 15px; background: #cbd5e1; box-shadow: inset 1px 2px 4px rgba(0,0,0,0.15); cursor: pointer; margin-bottom: 12px; }
        html.dark-mode .ios-toggle-switch { background: var(--primary-orange); box-shadow: inset 1px 2px 4px rgba(0,0,0,0.2), 0 0 8px rgba(255, 118, 26, 0.3); }
        .ios-switch-thumb { position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; box-shadow: 1px 2px 4px rgba(0,0,0,0.2); }
        html.dark-mode .ios-switch-thumb { transform: translateX(24px); }
        .btn-reset { border: none; background: var(--case-color); color: var(--loss-red) !important; padding: 6px 16px; border-radius: 8px; font-size: 0.72rem; letter-spacing: 1px; cursor: pointer; box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light); outline: none; user-select: none; }
        .btn-reset:active { box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light); }

        .total-cost-block { margin-bottom: 24px; padding: 16px 20px; align-items: flex-start; text-align: left; }
        .total-cost-block .block-value { margin-bottom: 0; font-size: 1.25rem; }

        .paper-tape { background: var(--case-color); padding: 18px; border-radius: 14px; box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light); }
        .tape-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted) !important; margin-bottom: 8px; letter-spacing: 0.5px; }
        .tape-total { color: var(--text-color) !important; border-top: 1px dashed var(--shadow-dark); padding-top: 8px; margin-top: 8px; }

        .bottom-sheet-pad { position: fixed; bottom: 0; left: 0; right: 0; background: var(--case-color); border-top-left-radius: 26px; border-top-right-radius: 26px; box-shadow: 0 -8px 30px rgba(0,0,0,0.15); transform: translateY(100%); z-index: 9999; padding: 18px 24px 20px 24px; }
        html.dark-mode .bottom-sheet-pad { box-shadow: 0 -8px 30px rgba(0,0,0,0.4); }
        .bottom-sheet-pad.open { transform: translateY(0); }
        .pad-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .pad-title { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 1px; }
        .btn-done { background: var(--primary-orange); color: #ffffff !important; border: none; padding: 8px 22px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; box-shadow: 2px 2px 5px var(--shadow-dark); }
        html.dark-mode .btn-done { color: #1a1c1e !important; }
        .pad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .pad-key { border: none; background: var(--case-color); color: var(--text-color) !important; padding: 16px 0; font-size: 1.4rem; border-radius: 14px; cursor: pointer; box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light); outline: none; user-select: none; }
        .pad-key:active { box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light); }
        .pad-delete { color: var(--loss-red) !important; }
    </style>
</head>
<body>

    <div class="calculator-casio">
        <div class="casio-top">
            <div class="brand-logo">CASIO <span>ST-26</span></div>
            <div class="solar-panel">
                <div class="solar-grid"></div><div class="solar-grid"></div><div class="solar-grid"></div><div class="solar-grid"></div>
            </div>
        </div>
        
        <div class="lcd-screen" id="lcdScreen">
            <div class="result-title" id="lcdStatus">NET PROFIT</div>
            <div class="profit-display-container">
                <span class="profit-value" id="netProfitDisplay">$0.00</span>
            </div>
        </div>
        
        <div class="input-grid">
            <div class="casio-field">
                <label>BUY PRICE</label>
                <input type="text" id="buyPrice" placeholder=".00" inputmode="none" readonly>
            </div>
            <div class="casio-field">
                <label>SELL PRICE</label>
                <input type="text" id="sellPrice" placeholder=".00" inputmode="none" readonly>
            </div>
            <div class="casio-field">
                <label>SHARES</label>
                <input type="text" id="shares" placeholder="0" inputmode="none" readonly>
            </div>
        </div>

        <div class="control-row">
            <div class="casio-btn-block sl-box">
                <div class="block-title">STOP LOSS (<span id="slPercentDisplay">-5.0%</span>)</div>
                <div class="block-value" id="slPriceDisplay">$0.00</div>
                <div class="sl-ctrls">
                    <button class="btn-casio-key" onclick="adjustSL(-0.5)">▼</button>
                    <button class="btn-casio-key" onclick="adjustSL(0.5)">▲</button>
                </div>
            </div>
            
            <div class="casio-btn-block dark-mode-box">
                <div class="block-title">DARK MODE</div>
                <div class="ios-toggle-switch" id="themeToggle">
                    <div class="ios-switch-thumb"></div>
                </div>
                <button class="btn-reset" onclick="resetAll()">RESET</button>
            </div>
        </div>

        <div class="casio-btn-block total-cost-block">
            <div class="block-title">TOTAL BUY COST</div>
            <div class="block-value" id="totalCostDisplay">$0.00</div>
        </div>

        <div class="paper-tape">
            <div class="tape-row"><span>BUY FEE:</span><span id="buyFeeDisplay">$0.00</span></div>
            <div class="tape-row"><span>SELL FEE:</span><span id="sellFeeDisplay">$0.00</span></div>
            <div class="tape-row tape-total"><span>TOTAL FEE:</span><span id="totalFeeDisplay">$0.00</span></div>
        </div>
    </div>

    <div class="bottom-sheet-pad" id="customPad">
        <div class="pad-header">
            <div class="pad-title" id="padTargetLabel">INPUTTING</div>
            <button class="btn-done" onclick="closePad()">DONE</button>
        </div>
        <div class="pad-grid">
            <button class="pad-key" onclick="tapKey('1')">1</button><button class="pad-key" onclick="tapKey('2')">2</button><button class="pad-key" onclick="tapKey('3')">3</button>
            <button class="pad-key" onclick="tapKey('4')">4</button><button class="pad-key" onclick="tapKey('5')">5</button><button class="pad-key" onclick="tapKey('6')">6</button>
            <button class="pad-key" onclick="tapKey('7')">7</button><button class="pad-key" onclick="tapKey('8')">8</button><button class="pad-key" onclick="tapKey('9')">9</button>
            <button class="pad-key" onclick="tapKey('.')">.</button><button class="pad-key" onclick="tapKey('0')">0</button><button class="pad-key pad-delete" onclick="tapKey('backspace')">⌫</button>
        </div>
    </div>

    <script>
        let stopLossPercent = -5.0;
        let currentActiveInput = null;
        const themeToggle = document.getElementById('themeToggle');
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        const customPad = document.getElementById('customPad');
        const padTargetLabel = document.getElementById('padTargetLabel');
        const lcdScreen = document.getElementById('lcdScreen');

        function toggleThemeClasses(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark-mode');
                document.body.classList.add('dark-mode');
                document.documentElement.style.colorScheme = 'dark';
                if(metaThemeColor) metaThemeColor.setAttribute('content', '#1e2024');
            } else {
                document.documentElement.classList.remove('dark-mode');
                document.body.classList.remove('dark-mode');
                document.documentElement.style.colorScheme = 'light';
                if(metaThemeColor) metaThemeColor.setAttribute('content', '#e3e7ee');
            }
        }

        initThemeByTime();
        function initThemeByTime() {
            const currentHour = new Date().getHours();
            const isDark = (currentHour >= 19 || currentHour < 7);
            toggleThemeClasses(isDark);
        }

        themeToggle.addEventListener('click', () => {
            const isCurrentlyDark = document.documentElement.classList.contains('dark-mode');
            toggleThemeClasses(!isCurrentlyDark);
        });

        const inputIds = ['buyPrice', 'sellPrice', 'shares'];
        inputIds.forEach(id => {
            const inputEl = document.getElementById(id);
            inputEl.addEventListener('click', (e) => {
                e.stopPropagation();
                inputIds.forEach(i => document.getElementById(i).classList.remove('focused'));
                currentActiveInput = inputEl;
                inputEl.classList.add('focused');
                padTargetLabel.textContent = `INPUTTING: ${inputEl.previousElementSibling.textContent}`;
                document.body.classList.add('keyboard-open');
                customPad.classList.add('open');
            });
        });

        document.addEventListener('click', (e) => { if (!customPad.contains(e.target)) closePad(); });
        function closePad() {
            customPad.classList.remove('open');
            document.body.classList.remove('keyboard-open');
            inputIds.forEach(i => document.getElementById(i).classList.remove('focused'));
            currentActiveInput = null;
        }

        function tapKey(key) {
            if (!currentActiveInput) return;
            let val = currentActiveInput.value;
            if (key === 'backspace') currentActiveInput.value = val.slice(0, -1);
            else if (key === '.') { if (currentActiveInput.id !== 'shares' && !val.includes('.')) currentActiveInput.value = val + '.'; }
            else currentActiveInput.value = val + key;
            calculate();
        }

        function resetAll() {
            inputIds.forEach(id => document.getElementById(id).value = '');
            calculate();
        }

        function adjustSL(val) {
            stopLossPercent = parseFloat((stopLossPercent + val).toFixed(1));
            if (stopLossPercent > 0) stopLossPercent = 0; 
            document.getElementById('slPercentDisplay').textContent = stopLossPercent.toFixed(1) + '%';
            calculate();
        }

        function calculate() {
            const buyPrice = parseFloat(document.getElementById('buyPrice').value) || 0;
            const sellPrice = parseFloat(document.getElementById('sellPrice').value) || 0;
            const shares = parseFloat(document.getElementById('shares').value) || 0;
            const lcdStatus = document.getElementById('lcdStatus');

            if (buyPrice > 0) {
                const slPrice = buyPrice * (1 + (stopLossPercent / 100));
                document.getElementById('slPriceDisplay').textContent = '$' + slPrice.toFixed(2);
            } else {
                document.getElementById('slPriceDisplay').textContent = '$0.00';
            }

            if (shares <= 0 || buyPrice <= 0) {
                document.getElementById('totalCostDisplay').textContent = '$0.00';
                document.getElementById('netProfitDisplay').textContent = '$0.00';
                document.getElementById('buyFeeDisplay').textContent = '$0.00';
                document.getElementById('sellFeeDisplay').textContent = '$0.00';
                document.getElementById('totalFeeDisplay').textContent = '$0.00';
                lcdStatus.textContent = "NET PROFIT";
                lcdScreen.classList.remove('is-loss');
                return;
            }

            const buyAmount = buyPrice * shares;
            const sellAmount = sellPrice * shares;
            let buyComm = Math.max(0.99, Math.min(0.005 * buyAmount, 0.0049 * shares));
            let buyPlatform = Math.max(1.00, Math.min(0.005 * buyAmount, 0.005 * shares));
            const totalBuyFees = buyComm + buyPlatform + (0.003 * shares) + (0.000003 * shares);

            const totalCost = buyAmount + totalBuyFees;
            document.getElementById('totalCostDisplay').textContent = '$' + totalCost.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            let totalSellFees = 0;
            if (sellPrice > 0) {
                let sellComm = Math.max(0.99, Math.min(0.005 * sellAmount, 0.0049 * shares));
                let sellPlatform = Math.max(1.00, Math.min(0.005 * sellAmount, 0.005 * shares));
                const sellSettlement = 0.003 * shares;
                const sellSec = Math.max(0.01, 0.0000206 * sellAmount);
                const sellTaf = Math.max(0.01, Math.min(9.79, 0.000195 * shares));
                totalSellFees = sellComm + sellPlatform + sellSettlement + sellSec + sellTaf + (0.000003 * shares);
            }

            const netProfit = sellPrice > 0 ? (sellAmount - buyAmount - totalBuyFees - totalSellFees) : 0;
            document.getElementById('buyFeeDisplay').textContent = '$' + totalBuyFees.toFixed(2);
            document.getElementById('sellFeeDisplay').textContent = '$' + totalSellFees.toFixed(2);
            document.getElementById('totalFeeDisplay').textContent = '$' + (totalBuyFees + totalSellFees).toFixed(2);

            const profitDisplay = document.getElementById('netProfitDisplay');
            if (sellPrice === 0) {
                profitDisplay.textContent = '$0.00';
                lcdStatus.textContent = "NET PROFIT";
                lcdScreen.classList.remove('is-loss');
            } else {
                const profitPercent = (netProfit / totalCost) * 100;
                if (netProfit >= 0) {
                    profitDisplay.textContent = '$' + netProfit.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    lcdStatus.textContent = "PROFIT [+ " + profitPercent.toFixed(2) + "%]";
                    lcdScreen.classList.remove('is-loss');
                } else {
                    profitDisplay.textContent = '$' + Math.abs(netProfit).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    lcdStatus.textContent = "LOSS [- " + Math.abs(profitPercent).toFixed(2) + "%]";
                    lcdScreen.classList.add('is-loss');
                }
            }
        }
    </script>
</body>
</html>
